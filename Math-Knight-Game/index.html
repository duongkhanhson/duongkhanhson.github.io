<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hiệp Sĩ Toán Học - Thầy Đường Khánh Sơn. MLAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #f1f5f9;
            touch-action: none;
            overflow: hidden;
            height: 100vh;
        }
        .font-game { font-family: 'Bungee', cursive; }
        
        /* Container chính */
        #game-wrapper {
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        #content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 15px;
            scrollbar-width: none;
        }
        #content-area::-webkit-scrollbar { display: none; }

        /* Bảng nháp */
        #scratch-canvas {
            touch-action: none;
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 25px 25px;
            cursor: crosshair;
            border-radius: 12px;
        }

        /* Animation */
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hp-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        footer {
            background: #1e293b;
            color: #94a3b8;
            font-size: 0.75rem;
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- Màn hình bắt đầu -->
        <div id="start-screen" class="absolute inset-0 z-50 bg-indigo-600 flex flex-col items-center justify-center p-6 text-center text-white">
            <h1 class="text-4xl font-game mb-2 leading-tight">HIỆP SĨ<br>TOÁN HỌC</h1>
            <p class="bg-yellow-400 text-indigo-900 px-4 py-1 rounded-full text-xs font-black mb-8">THẦY ĐƯỜNG KHÁNH SƠN . MLAB</p>
            <div class="text-8xl mb-10 floating">🛡️</div>
            <button onclick="startGame()" class="w-full max-w-xs bg-white text-indigo-600 font-game py-5 rounded-2xl text-2xl shadow-[0_6px_0_#cbd5e1] active:translate-y-1 active:shadow-none transition-all">
                VÀO TRẬN!
            </button>
            <p class="mt-12 text-indigo-200 text-sm">Chinh phục Toán lớp 5 cùng MLAB</p>
        </div>

        <!-- Thanh HP cố định trên cùng -->
        <div class="bg-slate-50 border-b-2 border-slate-200 p-4 shrink-0">
            <div class="flex justify-between items-center gap-6">
                <div class="flex-1">
                    <div class="flex justify-between text-[10px] font-black text-blue-600 mb-1 uppercase tracking-wider">
                        <span>HIỆP SĨ</span>
                        <span id="player-hp-text">100/100</span>
                    </div>
                    <div class="h-3 bg-slate-200 rounded-full border-2 border-slate-800 overflow-hidden">
                        <div id="player-hp-bar" class="hp-bar h-full bg-green-500" style="width: 100%"></div>
                    </div>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between text-[10px] font-black text-red-600 mb-1 uppercase tracking-wider">
                        <span id="enemy-hp-text">100/100</span>
                        <span>QUÁI VẬT</span>
                    </div>
                    <div class="h-3 bg-slate-200 rounded-full border-2 border-slate-800 overflow-hidden">
                        <div id="enemy-hp-bar" class="hp-bar h-full bg-red-500" style="width: 100%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Khu vực nội dung cuộn -->
        <div id="content-area">
            <!-- Nhân vật -->
            <div class="h-28 flex justify-between items-center px-4 relative bg-blue-50/50 rounded-2xl mb-4 border-2 border-blue-100/50">
                <div id="player-sprite" class="text-6xl transition-transform duration-300">⚔️</div>
                <div id="msg-popup" class="absolute left-1/2 -translate-x-1/2 font-game text-xl opacity-0 transition-all pointer-events-none z-10"></div>
                <div id="enemy-sprite" class="text-7xl floating transition-transform duration-300">👾</div>
            </div>

            <!-- Đề bài -->
            <div class="bg-white border-2 border-indigo-500 rounded-2xl p-5 mb-4 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                <p id="q-type" class="text-[10px] font-black text-indigo-400 uppercase text-center mb-2 tracking-widest">ĐANG TẢI...</p>
                <p id="q-text" class="text-2xl font-bold text-center text-slate-800"></p>
            </div>

            <!-- Các đáp án -->
            <div id="options-grid" class="grid grid-cols-2 gap-3 mb-6">
                <!-- Buttons sinh bởi JS -->
            </div>

            <!-- Bảng nháp dưới đáp án -->
            <div class="mt-4">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Bảng Nháp MLAB (800px)</span>
                    <div class="flex gap-2">
                        <button onclick="changeColor('#3b82f6')" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-white"></button>
                        <button onclick="changeColor('#ef4444')" class="w-6 h-6 rounded-full bg-red-500 border-2 border-white"></button>
                        <button onclick="clearCanvas()" class="bg-slate-200 text-[10px] px-3 py-1 rounded font-black hover:bg-slate-300">XÓA</button>
                    </div>
                </div>
                <div class="border-2 border-slate-200 rounded-2xl overflow-hidden shadow-inner bg-white">
                    <canvas id="scratch-canvas" style="height: 800px; width: 100%;"></canvas>
                </div>
                <p class="text-center text-[10px] text-slate-300 mt-3 italic font-bold">Cuộn lên để xem lại đề bài nếu cần</p>
            </div>
        </div>

        <!-- Màn hình kết thúc -->
        <div id="end-screen" class="hidden absolute inset-0 z-50 bg-slate-900/95 flex flex-col items-center justify-center p-8 text-center text-white">
            <div id="end-icon" class="text-8xl mb-4">🏆</div>
            <h2 id="end-title" class="text-3xl font-game mb-2">CHIẾN THẮNG</h2>
            <p id="final-score" class="text-xl mb-10 opacity-80">Điểm số: 0</p>
            <button onclick="location.reload()" class="w-full max-w-xs bg-indigo-500 py-5 rounded-2xl font-game text-xl shadow-lg">CHƠI LẠI</button>
        </div>

        <!-- Copyright -->
        <footer>
            Thầy Đường Khánh Sơn. MLAB
        </footer>
    </div>

    <script>
        // Game State
        let playerHP = 100;
        let enemyHP = 100;
        let score = 0;
        let level = 1;
        let correctAns = 0;
        let brushColor = '#3b82f6';
        const monsters = ['👾', '🐉', '🧟', '👹', '🦂', '👻', '🐙', '🦀', '👹'];

        // Canvas Setup
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = 800;
            ctx.strokeStyle = brushColor;
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const getXY = (e) => {
                const r = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - r.left) * (canvas.width / r.width),
                    y: (clientY - r.top) * (canvas.height / r.height)
                };
            };

            const start = (e) => { isDrawing = true; const p = getXY(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if(!isDrawing) return; const p = getXY(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const stop = () => isDrawing = false;

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);

            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', move);
            canvas.addEventListener('touchend', stop);
        }

        function changeColor(c) { brushColor = c; ctx.strokeStyle = c; }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // Math Logic
        function newQuestion() {
            const types = [
                { id: 'add', label: 'Cộng Số Thập Phân' },
                { id: 'mul', label: 'Nhân Số Thập Phân' },
                { id: 'div', label: 'Chia Số Thập Phân' },
                { id: 'mixed', label: 'Hỗn Số' },
                { id: 'percent', label: 'Tỉ Số Phần Trăm' },
                { id: 'area', label: 'Diện Tích Hình Thang' },
                { id: 'findx', label: 'Tìm X' }
            ];
            const type = types[Math.floor(Math.random() * types.length)];
            document.getElementById('q-type').innerText = `Dạng: ${type.label}`;

            let q = "";
            let ans = 0;

            switch(type.id) {
                case 'add':
                    let a1 = (Math.random() * 30 + 5).toFixed(2);
                    let a2 = (Math.random() * 20 + 5).toFixed(2);
                    q = `${a1} + ${a2} = ?`;
                    ans = (parseFloat(a1) + parseFloat(a2)).toFixed(2);
                    break;
                case 'mul':
                    let m1 = (Math.random() * 6 + 1).toFixed(1);
                    let m2 = (Math.random() * 5 + 2).toFixed(1);
                    q = `${m1} × ${m2} = ?`;
                    ans = (parseFloat(m1) * parseFloat(m2)).toFixed(2);
                    break;
                case 'div':
                    let d2 = Math.floor(Math.random() * 5) + 2;
                    let d1 = (d2 * (Math.floor(Math.random() * 10) + 1.5)).toFixed(1);
                    q = `${d1} : ${d2} = ?`;
                    ans = (parseFloat(d1) / d2).toFixed(2);
                    break;
                case 'mixed':
                    let ng = Math.floor(Math.random() * 5) + 1;
                    q = `Số thập phân của hỗn số ${ng} và 1/4 là?`;
                    ans = ng + 0.25;
                    break;
                case 'percent':
                    let tot = [100, 200, 500, 1000][Math.floor(Math.random()*4)];
                    let pct = [10, 15, 20, 25, 50][Math.floor(Math.random()*4)];
                    q = `Tính ${pct}% của ${tot}?`;
                    ans = (tot * pct) / 100;
                    break;
                case 'area':
                    let dL = 12, dB = 8, h = 5;
                    q = `S hình thang: Đáy lớn ${dL}cm, Đáy bé ${dB}cm, Cao ${h}cm?`;
                    ans = ((dL + dB) * h) / 2;
                    break;
                case 'findx':
                    let xVal = Math.floor(Math.random() * 20) + 5;
                    let v = (Math.random() * 5).toFixed(1);
                    q = `Tìm X: X - ${v} = ${(xVal - v).toFixed(1)}`;
                    ans = xVal;
                    break;
            }

            correctAns = ans;
            document.getElementById('q-text').innerText = q;
            renderOptions(ans);
        }

        function renderOptions(correct) {
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            let opts = [correct];
            while(opts.length < 4) {
                let off = (Math.random() * 5 + 0.1).toFixed(correct.toString().includes('.') ? 2 : 0);
                let w = (parseFloat(correct) + (Math.random() > 0.5 ? parseFloat(off) : -parseFloat(off))).toFixed(correct.toString().includes('.') ? 2 : 0);
                if(!opts.includes(w) && w >= 0) opts.push(w);
            }
            opts.sort(() => Math.random() - 0.5);

            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "bg-white hover:bg-indigo-50 text-slate-800 font-black py-4 rounded-xl border-2 border-slate-200 transition-all active:scale-95 shadow-sm text-lg";
                b.innerText = o;
                b.onclick = () => check(o);
                grid.appendChild(b);
            });
        }

        function check(sel) {
            if(sel == correctAns) {
                enemyHP -= 25;
                score += (10 * level);
                popup("TUYỆT VỜI! ⚔️", "text-green-500");
                animate('player-sprite', 'translate-x-20');
                if(enemyHP <= 0) spawn();
            } else {
                playerHP -= 20;
                popup("CỐ LÊN! 💥", "text-red-500");
                animate('enemy-sprite', '-translate-x-20');
                document.getElementById('game-wrapper').classList.add('shake');
                setTimeout(() => document.getElementById('game-wrapper').classList.remove('shake'), 400);
                if(playerHP <= 0) end(false);
            }
            update();
            clearCanvas();
            document.getElementById('content-area').scrollTop = 0;
            newQuestion();
        }

        function spawn() {
            level++;
            enemyHP = 100;
            document.getElementById('enemy-sprite').innerText = monsters[Math.floor(Math.random() * monsters.length)];
            popup("QUÁI MỚI! 👹", "text-purple-600");
        }

        function popup(txt, col) {
            const p = document.getElementById('msg-popup');
            p.innerText = txt;
            p.className = `absolute left-1/2 -translate-x-1/2 font-game text-xl opacity-100 -translate-y-12 transition-all duration-500 ${col}`;
            setTimeout(() => { p.className = `absolute left-1/2 -translate-x-1/2 font-game text-xl opacity-0 transition-all pointer-events-none`; }, 700);
        }

        function animate(id, cl) {
            const el = document.getElementById(id);
            el.classList.add(cl);
            setTimeout(() => el.classList.remove(cl), 300);
        }

        function update() {
            document.getElementById('player-hp-bar').style.width = playerHP + '%';
            document.getElementById('enemy-hp-bar').style.width = enemyHP + '%';
            document.getElementById('player-hp-text').innerText = `${playerHP}/100`;
            document.getElementById('enemy-hp-text').innerText = `${enemyHP}/100`;
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            initCanvas();
            newQuestion();
        }

        function end(win) {
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-title').innerText = win ? "THẮNG LỢI" : "THẤT BẠI";
            document.getElementById('final-score').innerText = `Tổng điểm: ${score}`;
        }

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
